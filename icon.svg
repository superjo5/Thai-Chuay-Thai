<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@700;900&amp;display=swap');</style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C68A"/>
      <stop offset="100%" stop-color="#0D7A52"/>
    </linearGradient>
    <clipPath id="ios"><rect width="512" height="512" rx="114"/></clipPath>
  </defs>

  <g clip-path="url(#ios)">
    <!-- พื้นหลัง -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- highlight บนซ้าย เบาๆ -->
    <rect width="512" height="256" fill="white" fill-opacity="0.04"/>

    <!-- คำนวณ -->
    <text x="256" y="226"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="116" fill="white"
      text-anchor="middle" letter-spacing="-2">คำนวณ</text>

    <!-- เส้นคั่น -->
    <rect x="80" y="256" width="352" height="3" rx="2" fill="white" fill-opacity="0.25"/>

    <!-- 60 -->
    <text x="148" y="400"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="130" fill="white"
      text-anchor="middle">60</text>

    <!-- / -->
    <text x="256" y="400"
      font-family="sans-serif"
      font-weight="300" font-size="100" fill="white"
      fill-opacity="0.4" text-anchor="middle">/</text>

    <!-- 40 -->
    <text x="368" y="400"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="130" fill="white"
      fill-opacity="0.55" text-anchor="middle">40</text>
  </g>
</svg>
