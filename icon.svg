<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@900&amp;display=swap');</style>
    <clipPath id="shape"><rect width="512" height="512" rx="108"/></clipPath>
  </defs>

  <!-- ทุกอย่าง clip ตามรูปร่างไอคอน -->
  <g clip-path="url(#shape)">
    <!-- พื้นหลังเขียว gradient สองโทน -->
    <rect width="512" height="512" fill="#1D9E75"/>
    <!-- แถบล่าง 60/40 สีเข้มกว่า -->
    <rect x="0" y="310" width="512" height="202" fill="#0F6E56"/>
    <!-- เส้นแบ่งบางๆ -->
    <rect x="0" y="308" width="512" height="4" fill="#ffffff" fill-opacity="0.15"/>

    <!-- คำนวณ -->
    <text x="256" y="248"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="128" fill="white"
      text-anchor="middle">คำนวณ</text>

    <!-- 60 ซ้าย -->
    <text x="128" y="438"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="118" fill="white"
      fill-opacity="0.95" text-anchor="middle">60</text>

    <!-- เส้นแบ่งกลาง -->
    <rect x="248" y="322" width="16" height="168" rx="8" fill="white" fill-opacity="0.3"/>

    <!-- 40 ขวา -->
    <text x="384" y="438"
      font-family="'Noto Sans Thai',sans-serif"
      font-weight="900" font-size="118" fill="white"
      fill-opacity="0.6" text-anchor="middle">40</text>
  </g>

  <!-- กรอบขาวบางๆ -->
  <rect x="10" y="10" width="492" height="492" rx="104" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="6"/>
</svg>
