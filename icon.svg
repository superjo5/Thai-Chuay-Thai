<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D9E75"/>
      <stop offset="100%" style="stop-color:#0F6E56"/>
    </linearGradient>
    <linearGradient id="calc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- พื้นหลังกลม -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- เงาอ่อนๆ ด้านบน -->
  <rect width="512" height="512" rx="112" fill="white" fill-opacity="0.06"/>

  <!-- ตัว calculator -->
  <rect x="96" y="80" width="320" height="352" rx="32" fill="url(#calc)" stroke="white" stroke-opacity="0.2" stroke-width="2"/>

  <!-- หน้าจอ display -->
  <rect x="120" y="108" width="272" height="90" rx="16" fill="white" fill-opacity="0.15"/>

  <!-- เลข 60/40 บน display -->
  <text x="256" y="163" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-weight="800" font-size="52" fill="white" letter-spacing="-1">60/40</text>

  <!-- divider line -->
  <line x1="120" y1="228" x2="392" y2="228" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- ปุ่ม row 1 -->
  <rect x="120" y="242" width="72" height="52" rx="12" fill="white" fill-opacity="0.12"/>
  <rect x="208" y="242" width="72" height="52" rx="12" fill="white" fill-opacity="0.12"/>
  <rect x="296" y="242" width="72" height="52" rx="12" fill="white" fill-opacity="0.12"/>
  <rect x="120" y="308" width="72" height="52" rx="12" fill="white" fill-opacity="0.12"/>
  <rect x="208" y="308" width="72" height="52" rx="12" fill="white" fill-opacity="0.12"/>
  <!-- ปุ่ม = สีเน้น -->
  <rect x="296" y="308" width="72" height="52" rx="12" fill="white" fill-opacity="0.3"/>
  <!-- ปุ่ม row 3 -->
  <rect x="120" y="374" width="160" height="42" rx="12" fill="white" fill-opacity="0.12"/>
  <rect x="296" y="374" width="72" height="42" rx="12" fill="white" fill-opacity="0.12"/>

  <!-- สัญลักษณ์บนปุ่ม -->
  <text x="156" y="275" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">7</text>
  <text x="244" y="275" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">8</text>
  <text x="332" y="275" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">9</text>
  <text x="156" y="341" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">4</text>
  <text x="244" y="341" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">5</text>
  <text x="332" y="341" text-anchor="middle" font-family="sans-serif" font-size="26" fill="white" font-weight="700">=</text>
  <text x="200" y="402" text-anchor="middle" font-family="sans-serif" font-size="22" fill="white" fill-opacity="0.7">0</text>
  <text x="332" y="402" text-anchor="middle" font-family="sans-serif" font-size="26" fill="white" fill-opacity="0.7">.</text>
</svg>
