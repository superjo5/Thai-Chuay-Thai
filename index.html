<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ไทยช่วยไทย">
<title>ไทยช่วยไทย พลัส</title>
<link rel="manifest" href="manifest.json">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#f4f6f4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  body{display:flex;flex-direction:column;align-items:center}
  .app{width:100%;max-width:480px;height:100%;padding:12px;display:flex;flex-direction:column;gap:10px}
  .topbar{background:#1D9E75;border-radius:14px;padding:11px 16px;color:#fff;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .topbar h1{font-size:16px;font-weight:600}
  .topbar .badge{font-size:11px;background:rgba(255,255,255,.2);padding:3px 9px;border-radius:20px}
  .row2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;flex-shrink:0}
  .card{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
  .lbl{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
  .inp-row{display:flex;align-items:center;gap:6px}
  .baht{font-size:22px;font-weight:600;color:#bbb}
  input[type=text]{flex:1;font-size:28px;font-weight:700;color:#222;background:#f7f7f7;border:2px solid #eee;border-radius:10px;padding:8px 12px;outline:none;width:100%}
  input[type=text]:focus{border-color:#1D9E75;background:#f0fbf7}
  .bbar-bg{height:6px;border-radius:3px;background:#eee;overflow:hidden;margin:9px 0 4px}
  .bbar-fill{height:100%;border-radius:3px;background:#1D9E75;transition:width .2s}
  .bbar-fill.low{background:#E07B00}
  .bbar-fill.empty{background:#E24B4A}
  .blabels{display:flex;justify-content:space-between;font-size:10px;color:#aaa}
  .max-hint{font-size:11px;color:#888;margin-top:6px;line-height:1.4}
  .max-hint strong{color:#222;font-weight:600}
  .split-bar{height:10px;border-radius:5px;background:#eee;display:flex;overflow:hidden;margin:8px 0 5px}
  .bar-g{background:#1D9E75;transition:width .2s;min-width:0}
  .bar-b{background:#378ADD;transition:width .2s;flex:1}
  .legend{display:flex;gap:10px;font-size:11px;color:#888;margin-bottom:8px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
  .res2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .rc{background:#f7f7f7;border-radius:10px;padding:9px 11px}
  .rc .rl{font-size:11px;color:#999;margin-bottom:3px}
  .rc .rv{font-size:22px;font-weight:700}
  .rv.green{color:#1D9E75}
  .rv.blue{color:#378ADD}
  .alert{border-radius:9px;padding:8px 11px;font-size:12px;line-height:1.45;margin-top:8px}
  .alert.warn{background:#FFF8E1;color:#9A6500}
  .alert.ok{background:#E8F5E9;color:#2E7D32}
  .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
  .info-item{background:#f7f7f7;border-radius:10px;padding:8px 10px;font-size:11px;color:#888;line-height:1.4}
  .info-item strong{color:#333;display:block;font-weight:600;font-size:12px;margin-bottom:1px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>ไทยช่วยไทย พลัส 💚</h1>
    <span class="badge">60 / 40</span>
  </div>

  <div class="row2">
    <div class="card">
      <div class="lbl">วงเงินรัฐเหลือวันนี้</div>
      <div class="inp-row">
        <span class="baht">฿</span>
        <input type="text" id="budget" inputmode="decimal" placeholder="200" oninput="calc()">
      </div>
      <div id="bbar-wrap" style="display:none">
        <div class="bbar-bg"><div class="bbar-fill" id="bbar" style="width:100%"></div></div>
        <div class="blabels"><span id="bleft">—</span><span>/ 200 ฿</span></div>
        <div class="max-hint" id="max-hint"></div>
      </div>
    </div>

    <div class="card">
      <div class="lbl">ราคาสินค้า</div>
      <div class="inp-row">
        <span class="baht">฿</span>
        <input type="text" id="price" inputmode="decimal" placeholder="0.00" oninput="calc()">
      </div>
    </div>
  </div>

  <div class="card" style="flex:1;min-height:0">
    <div class="lbl">ผลการคำนวณ</div>
    <div class="split-bar">
      <div class="bar-g" id="bg" style="width:0%"></div>
      <div class="bar-b" id="bb" style="width:100%"></div>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:#1D9E75"></span>รัฐออก</span>
      <span><span class="dot" style="background:#378ADD"></span>คุณออก</span>
    </div>
    <div class="res2">
      <div class="rc"><div class="rl">รัฐออกให้จริง</div><div class="rv green" id="gov">—</div></div>
      <div class="rc"><div class="rl">คุณต้องจ่าย</div><div class="rv blue" id="you">—</div></div>
    </div>
    <div id="alert"></div>
  </div>

  <div class="card" style="flex-shrink:0">
    <div class="lbl">ข้อมูลโครงการ</div>
    <div class="info-grid">
      <div class="info-item"><strong>📅 ระยะเวลา</strong>1 มิ.ย. – 30 ก.ย. 2569</div>
      <div class="info-item"><strong>💰 วงเงิน</strong>1,000 ฿/เดือน · รวม 4,000 ฿</div>
      <div class="info-item"><strong>⏰ เวลาใช้สิทธิ์</strong>06:00 – 23:00 น.</div>
      <div class="info-item"><strong>⚠️ หมายเหตุ</strong>วงเงินไม่สะสมข้ามเดือน</div>
    </div>
  </div>
</div>

<script>
function fmt(n){return n.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})+' ฿'}
function parseNum(s){var v=parseFloat(s.replace(/[^0-9.]/g,''));return isNaN(v)?0:v;}
function calc(){
  var p=parseNum(document.getElementById('price').value);
  var bRaw=document.getElementById('budget').value.trim();
  var hasBudget=bRaw!=='';
  var b=hasBudget?Math.min(parseNum(bRaw),200):200;
  if(hasBudget){
    document.getElementById('bbar-wrap').style.display='block';
    var bPct=Math.min(100,Math.round((b/200)*100));
    var bar=document.getElementById('bbar');
    bar.style.width=bPct+'%';
    bar.className='bbar-fill'+(b===0?' empty':b<=50?' low':'');
    document.getElementById('bleft').textContent='เหลือ '+fmt(b);
    if(b>0){
      var maxP=parseFloat((b/0.6).toFixed(2));
      var youMax=parseFloat((maxP-b).toFixed(2));
      document.getElementById('max-hint').innerHTML='ซื้อได้สูงสุด <strong>'+fmt(maxP)+'</strong> (คุณออก '+fmt(youMax)+')';
    } else {
      document.getElementById('max-hint').innerHTML='วงเงินหมดแล้ว';
    }
  } else {
    document.getElementById('bbar-wrap').style.display='none';
  }
  if(!p){
    document.getElementById('bg').style.width='0%';
    document.getElementById('bb').style.width='100%';
    document.getElementById('gov').textContent='—';
    document.getElementById('you').textContent='—';
    document.getElementById('alert').innerHTML='';
    return;
  }
  var gIdeal=parseFloat(Math.min(p*0.6,200).toFixed(2));
  var g=parseFloat(Math.min(gIdeal,b).toFixed(2));
  var y=parseFloat((p-g).toFixed(2));
  var gp=Math.round((g/p)*100);
  document.getElementById('gov').textContent=fmt(g);
  document.getElementById('you').textContent=fmt(y);
  document.getElementById('bg').style.width=gp+'%';
  document.getElementById('bb').style.width=(100-gp)+'%';
  var msg='';
  if(b===0){
    msg='<div class="alert warn">⚠️ วงเงินหมดแล้ว — ต้องจ่ายเองทั้งหมด '+fmt(p)+'</div>';
  } else if(hasBudget&&gIdeal>b){
    msg='<div class="alert warn">⚠️ วงเงินเหลือแค่ '+fmt(b)+' — คุณออกเพิ่มเป็น '+fmt(y)+'</div>';
  } else if(p*0.6>200){
    msg='<div class="alert warn">⚠️ ราคาเกิน 333.34 ฿ — รัฐช่วยสูงสุด '+fmt(g)+' คุณออก '+fmt(y)+'</div>';
  } else {
    msg='<div class="alert ok">✅ ประหยัดได้ '+fmt(g)+' ('+gp+'%) จ่ายจริงแค่ '+fmt(y)+'</div>';
  }
  document.getElementById('alert').innerHTML=msg;
}
</script>
<script>if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");</script>
</body>
</html>
